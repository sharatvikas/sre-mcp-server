name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --timeout=30
        env:
          ANTHROPIC_API_KEY: "test-key-not-used-in-unit-tests"
          PAGERDUTY_API_KEY: "test-key"
          GRAFANA_URL: "http://localhost:3000"
          GRAFANA_TOKEN: "test-token"

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/sre_mcp_server/ --ignore-missing-imports
        continue-on-error: true  # Type hints are best-effort in early development

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sre-mcp-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
